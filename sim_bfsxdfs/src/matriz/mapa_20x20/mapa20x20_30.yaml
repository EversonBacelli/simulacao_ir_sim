world:
  height: 21
  width: 21
  step_time: 0.1
  sample_time: 0.1
  offset: [0, 0]
  control_mode: 'manual'
  collision_mode: 'unobstructed'
  plot:
    show-title: True
    title: 'Novo Robot World 21x21 (Shape: Rectangle & Clearance)'
    show-axis: True
    x-label: 'X'
    y-label: 'Y'

robot:
  - number: 1
    kinematics: {name: 'omni'}
    shape: {name: 'circle', radius: 0.2}
    state: [15, 5, 0] 
    goal: [19, 1, 0]
    behavior: {name: 'dash'}
    color: 'g'
    plot:
     show_trajectory: True
    sensors:
        - name: 'lidar2d'
          range_min: 1.0
          range_max: 5
          angle_range: 6.0
          number: 50
          noise: True
          alpha: 0.2

obstacle:
  # Shape: rectangle (Formato compatível com IR-SIM)
  # Clearance: 0.95 (Corrige colisões falsas nas passagens 1.0m)
